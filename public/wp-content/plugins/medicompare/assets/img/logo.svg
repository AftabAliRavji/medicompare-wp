<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Pill Outline -->
  <defs>
    <linearGradient id="pillOutline" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#00A67A"/>
    </linearGradient>
  </defs>

  <!-- Pill Body -->
  <rect x="10" y="10" width="140" height="60" rx="30" fill="white" stroke="url(#pillOutline)" stroke-width="3"/>

  <!-- Left Half -->
  <rect x="10" y="10" width="70" height="60" rx="30" fill="#0066CC"/>

  <!-- Right Half -->
  <rect x="80" y="10" width="70" height="60" rx="30" fill="#00A67A"/>

  <!-- Comparison Bars -->
  <rect x="55" y="25" width="10" height="30" rx="3" fill="white"/>
  <rect x="75" y="20" width="10" height="40" rx="3" fill="white"/>
  <rect x="95" y="25" width="10" height="30" rx="3" fill="white"/>

  <!-- Wordmark -->
  <text x="170" y="52" font-family="Inter, Manrope, sans-serif" font-size="32" font-weight="600" fill="#111">
    MediCompare
  </text>
</svg>
